{% extends 'base.html' %}
{% load static %}

{% block title %}Add Schedule{% endblock %}

{% block content %}

<div class="register-container">
    <div class="register-header">
        <h1>Add New Schedule</h1>
        <p>Create a new class timetable entry</p>
    </div>

    <div class="register-form active">
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Day <span class="required">*</span></label>
                <select name="day" required>
                    <option value="">-- Select Day --</option>
                    <option value="MONDAY">Monday</option>
                    <option value="TUESDAY">Tuesday</option>
                    <option value="WEDNESDAY">Wednesday</option>
                    <option value="THURSDAY">Thursday</option>
                    <option value="FRIDAY">Friday</option>
                    <option value="SATURDAY">Saturday</option>
                </select>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Subject <span class="required">*</span></label>
                    <select name="subject" required>
                        <option value="">-- Select Subject --</option>
                        {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Teacher <span class="required">*</span></label>
                    <select name="teacher" required>
                        <option value="">-- Select Teacher --</option>
                        {% for teacher in teachers %}
                        <option value="{{ teacher.id }}">{{ teacher.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Classroom <span class="required">*</span></label>
                    <select name="classroom" required>
                        <option value="">-- Select Class --</option>
                        {% for classroom in classrooms %}
                        <option value="{{ classroom.id }}">{{ classroom.name }} {% if classroom.stream %}({{ classroom.stream }}){% endif %}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Room / Venue</label>
                    <input type="text" name="room" placeholder="e.g., Room 101, Lab A">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Start Time <span class="required">*</span></label>
                    <input type="time" name="start_time" required>
                </div>
                <div class="form-group">
                    <label>End Time <span class="required">*</span></label>
                    <input type="time" name="end_time" required>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Schedule
                </button>
                <a href="{% url 'schedule_list' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
.btn-secondary {
    background: #6c757d;
    color: white;
    padding: 10px 30px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    text-decoration: none;
    display: inline-block;
}

.form-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}
</style>

{% endblock %}
